databaseChangeLog:
  - changeSet:
      id: 001-create-developers-table
      author: platform-devex-team
      comment: "Create developers table for identity registry (ADR-003)"
      changes:
        - createTable:
            tableName: developers
            columns:
              - column:
                  name: developer_id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email
                  type: varchar(255)
              - column:
                  name: display_name
                  type: varchar(255)
              - column:
                  name: public_key
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: developers
