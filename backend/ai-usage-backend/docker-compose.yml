version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-usage-postgres
    environment:
      POSTGRES_USER: aiusage
      POSTGRES_PASSWORD: aiusage_secret
      POSTGRES_DB: aiusage
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiusage -d aiusage"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.29
    container_name: ai-usage-liquibase
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./liquibase:/liquibase/changelog
    command: >
      --search-path=/liquibase/changelog
      --changelog-file=db.changelog-master.yaml
      --url=jdbc:postgresql://postgres:5432/aiusage
      --username=aiusage
      --password=aiusage_secret
      update
    profiles:
      - migrate

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-usage-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://aiusage:aiusage_secret@postgres:5432/aiusage
      RUST_LOG: info
    ports:
      - "8080:8080"
    profiles:
      - app

volumes:
  postgres_data:
