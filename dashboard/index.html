<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Usage Dashboard</title>
    <script>
      // Apply persisted theme before first paint to avoid a flash of the wrong theme.
      (function () {
        try {
          var stored = localStorage.getItem('ai-usage-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || ((!stored || stored === 'system') && prefersDark);
          document.documentElement.classList.toggle('dark', isDark);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
